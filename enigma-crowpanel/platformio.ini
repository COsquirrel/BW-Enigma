; ══════════════════════════════════════════════════════════════
;  BW ENIGMA — PlatformIO build configuration
;
;  TO SWITCH HARDWARE: change default_envs below.
;    growcube   → GrowCube 5" ESP32 LX6    (development hardware)
;    crowpanel  → CrowPanel 5" ESP32-S3    (production target)
; ══════════════════════════════════════════════════════════════
[platformio]
default_envs = crowpanel

; ── Shared settings ────────────────────────────────────────────
[common]
monitor_speed  = 115200
upload_speed   = 460800
lib_deps_common =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.4

build_flags_common =
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_HAS_PSRAM
    -I src
    -I include


; ══════════════════════════════════════════════════════════════
;  GrowCube 5"  —  ESP32-S3  (development hardware)
;
;  Uses Arduino_GFX with Arduino_RGB_Display (ESP32-S3 RGB LCD peripheral).
;  Pins are configured in src/board_config.h under #ifdef BOARD_GROWCUBE.
; ══════════════════════════════════════════════════════════════
[env:growcube]
platform  = espressif32
board     = esp32-s3-devkitc-1   ; GrowCube is ESP32-S3
framework = arduino

board_build.mcu                      = esp32s3
board_build.f_cpu                    = 240000000L
board_build.flash_mode               = dio
board_build.psram_type               = opi   ; adjust if GrowCube has different PSRAM
board_build.arduino.memory_type      = qio_opi
board_upload.flash_size              = 4MB
board_build.partitions               = partitions.csv

monitor_speed  = ${common.monitor_speed}
upload_speed   = ${common.upload_speed}

build_flags =
    ${common.build_flags_common}
    -DBOARD_GROWCUBE

lib_deps =
    ${common.lib_deps_common}
    https://github.com/moononournation/Arduino_GFX.git


; ══════════════════════════════════════════════════════════════
;  Elecrow CrowPanel 5"  —  ESP32-S3  (production target)
;  Model: WZ8048C050, 800×480 RGB, GT911 touch
;
;  Uses LovyanGFX with Panel_RGB + Bus_RGB (ESP32-S3 RGB LCD peripheral).
;  All pins in src/board_config.h under #ifdef BOARD_CROWPANEL.
; ══════════════════════════════════════════════════════════════
[env:crowpanel]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.mcu                      = esp32s3
board_build.f_cpu                    = 240000000L
board_build.flash_mode               = dio
board_build.psram_type               = opi
board_build.arduino.memory_type      = qio_opi
board_upload.flash_size              = 4MB
board_build.partitions               = partitions.csv

monitor_speed  = ${common.monitor_speed}
upload_speed   = ${common.upload_speed}

build_flags =
    ${common.build_flags_common}
    -DBOARD_CROWPANEL

lib_deps =
    ${common.lib_deps_common}
    https://github.com/moononournation/Arduino_GFX.git
