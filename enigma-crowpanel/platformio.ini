; ══════════════════════════════════════════════════════════════
;  BW ENIGMA — CrowPanel 5"  ESP32-S3
;  Model:  WZ8048C050, 800×480 RGB, GT911 touch
;  Module: ESP32-S3-WROOM-1-N4R8 (4MB Flash, 8MB OPI PSRAM)
;  Uses Arduino_GFX (RGB LCD peripheral)
;  Pins: src/board_config.h  #ifdef BOARD_CROWPANEL
; ══════════════════════════════════════════════════════════════
[platformio]
default_envs = crowpanel

[env:crowpanel]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.mcu                 = esp32s3
board_build.f_cpu               = 240000000L
board_build.flash_mode          = dio
board_build.psram_type          = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 4MB
board_build.partitions          = partitions.csv

monitor_speed = 115200
upload_speed  = 460800

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_HAS_PSRAM
    -DBOARD_CROWPANEL
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I src
    -I include

lib_deps =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.4
    https://github.com/moononournation/Arduino_GFX.git#v1.6.6
