[env:elecrow_crowpanel_5]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.mcu              = esp32s3
board_build.f_cpu            = 240000000L
board_build.flash_mode       = qio
board_build.psram_type       = opi
board_upload.flash_size      = 16MB

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; LVGL config
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    -I include

lib_deps =
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.4
    arduino-libraries/Preferences

monitor_speed  = 115200
upload_speed   = 921600

; CrowPanel 5" uses Arduino_GFX + LVGL or ESP_Panel_Library.
; Adjust the driver lib to match your board's SDK.
; Common for Elecrow CrowPanel 5" (ESP32-S3, RGB LCD, GT911 touch):
lib_deps +=
    moononournation/Arduino_GFX_Library@^1.4.7
    ; If you use the official Elecrow SDK drop the above and add their lib here.
