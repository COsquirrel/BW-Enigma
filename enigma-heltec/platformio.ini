[platformio]
default_envs = heltec_lora_v3

[env:heltec_lora_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    jgromes/RadioLib @ ^6.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=0

; Sender unit - uncomment for unit 1
; build_flags =
;     -DUNIT_ROLE=0

; Receiver unit - uncomment for unit 2 flash
; build_flags =
;     -DUNIT_ROLE=1
